name: Build Macos

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install build prerequisites
        run: brew install automake libtool

      - name: Checkout, build, and install wolfssl
        # Use the canonical wolfSSL composite action — same one OS Check
        # uses on macos-latest with v5.9.1-stable, so we get a known-
        # green baseline instead of an open-coded chain that's broken
        # for unrelated reasons on this runner image.
        uses: wolfSSL/actions-build-autotools-project@v1
        with:
          repository: wolfssl/wolfssl
          ref: v5.9.1-stable
          path: wolfssl
          configure: --enable-all
          check: false
          install: true

      - uses: actions/checkout@v4
        with:
          clean: false
      - name: Inspect wolfssl install layout
        if: always()
        run: |
          echo "--- workspace ---"
          ls -la "${{ github.workspace }}" || true
          echo "--- build-dir ---"
          ls -la "${{ github.workspace }}/build-dir" || true
          echo "--- build-dir/lib ---"
          ls -la "${{ github.workspace }}/build-dir/lib" 2>/dev/null || true
          echo "--- build-dir/include ---"
          ls -la "${{ github.workspace }}/build-dir/include" 2>/dev/null || true
          echo "--- /usr/local/lib/libwolfssl* ---"
          ls -la /usr/local/lib/libwolfssl* 2>/dev/null || echo "(none)"
          echo "--- /opt/homebrew/lib/libwolfssl* ---"
          ls -la /opt/homebrew/lib/libwolfssl* 2>/dev/null || echo "(none)"
      - name: autogen
        run: ./autogen.sh
      - name: configure
        # The canonical wolfSSL action installs to ${{ github.workspace }}/build-dir,
        # not /usr/local/lib, so wolfssh's configure can't find libwolfssl
        # without explicit LDFLAGS/CPPFLAGS — same pattern Paramiko SFTP uses.
        run: ./configure LDFLAGS="-L${{ github.workspace }}/build-dir/lib" CPPFLAGS="-I${{ github.workspace }}/build-dir/include"
      - name: Show config.log on configure failure
        if: failure()
        run: tail -200 config.log || true
      - name: make
        run: make
      - name: make check
        run: make check
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/build-dir/lib

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wolfssh-macos
          path: |
            src/.libs/
            src/libwolfssh*.la
          if-no-files-found: warn
