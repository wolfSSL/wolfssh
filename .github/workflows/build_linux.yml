name: Build Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: wolfssl/wolfssl
          ref: v5.9.1-stable
      - name: Setup wolfssl
        run: ./autogen.sh && ./configure --enable-keygen --enable-cryptonly --enable-ssh && make && make check && sudo make install && sudo ldconfig

      - uses: actions/checkout@v4
      - name: autogen
        run: ./autogen.sh
      - name: configure
        run: ./configure
      - name: make
        run: make
      - name: make check
        run: make check

      - uses: actions/upload-artifact@v4
        with:
          name: wolfssh-linux
          path: src/.libs/
          if-no-files-found: error
