name: Build Macos

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install build prerequisites
        run: brew install automake libtool

      - name: Checkout, build, and install wolfssl
        # Use the canonical wolfSSL composite action — same one OS Check
        # uses on macos-latest with v5.9.1-stable, so we get a known-
        # green baseline instead of an open-coded chain that's broken
        # for unrelated reasons on this runner image.
        uses: wolfSSL/actions-build-autotools-project@v1
        with:
          repository: wolfssl/wolfssl
          ref: v5.9.1-stable
          path: wolfssl
          configure: --enable-all
          check: false
          install: true

      - uses: actions/checkout@v4
      - name: autogen
        run: ./autogen.sh
      - name: configure
        run: ./configure
      - name: make
        run: make
      - name: make check
        run: make check

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wolfssh-macos
          path: |
            src/.libs/
            src/libwolfssh*.la
          if-no-files-found: warn
