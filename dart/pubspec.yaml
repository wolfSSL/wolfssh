name: wolfssh
description: >-
  Unofficial Dart FFI bindings for the wolfSSH client (host-key verification
  mandatory). Not affiliated with wolfSSL Inc.
version: 0.1.0
homepage: https://github.com/j4qfrost/wolfssh
repository: https://github.com/j4qfrost/wolfssh
issue_tracker: https://github.com/j4qfrost/wolfssh/issues
topics: [ssh, ffi, wolfssh, security, networking]

environment:
  sdk: ^3.4.0

dependencies:
  ffi: ^2.1.3

dev_dependencies:
  ffigen: ^14.0.0
  test: ^1.25.0
  lints: ^4.0.0
