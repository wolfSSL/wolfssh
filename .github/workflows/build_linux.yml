name: Build Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: wolfssl/wolfssl
          ref: v5.9.1-stable
      - name: Setup wolfssl
        # Match the configure used by the OS Check workflow which
        # already passes wolfssl v5.9.1-stable across the matrix.
        run: ./autogen.sh && ./configure --enable-all && make -j$(nproc) && sudo make install && sudo ldconfig

      - uses: actions/checkout@v4
      - name: autogen
        run: ./autogen.sh
      - name: configure
        run: ./configure
      - name: make
        run: make
      - name: make check
        run: make check

      - name: Diagnostic listing for artifact upload
        if: always()
        run: |
          echo "--- src/ contents ---"
          ls -la src/ || true
          echo "--- src/.libs/ contents (if exists) ---"
          ls -la src/.libs/ 2>/dev/null || echo "(no src/.libs/)"
          echo "--- find libwolfssh* ---"
          find . -name 'libwolfssh*' -type f 2>/dev/null | head -20

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wolfssh-linux
          path: |
            src/.libs/
            src/libwolfssh*.la
            src/*.o
          if-no-files-found: warn
